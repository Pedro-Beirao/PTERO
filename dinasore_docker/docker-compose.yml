name: dinasore${FB_PORT}

services:
  dinasore:
    container_name: dinasore${FB_PORT}
    hostname: dinasore${FB_PORT}

    build:
      dockerfile: dinasore/Dockerfile

    restart: unless-stopped
    pull_policy: always

    ports:
      - "${FB_PORT:-61499}:61499"
      - "${OPCUA_PORT:-4840}:4840"
      - "${SSH_PORT:-22}:22"

    healthcheck:
      test: ["CMD-SHELL", "python3 /root/dinasore/tests/__init__.py"]
      interval: 1m
      timeout: 30s
      retries: 10

    volumes:
      - ./data:/data
