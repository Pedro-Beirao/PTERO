%% feupteses.sty configuration for M.EIC
%%

\logo{uporto-feup.pdf}

% color for listings
\definecolor{cloudwhite}{cmyk}{0,0,0,0.025}  % color

%% Include source-code listings package
\usepackage{listings}

\lstset{
 captionpos=b
}

\lstset{ %
 language=C,                        % choose the language of the code
 basicstyle=\footnotesize\ttfamily,
 keywordstyle=\bfseries,
 numbers=left,                      % where to put the line-numbers
 numberstyle=\scriptsize\texttt,    % the size of the fonts that are used for the line-numbers
 stepnumber=1,                      % the step between two line-numbers. If it's 1 each line will be numbered
 numbersep=8pt,                     % how far the line-numbers are from the code
 frame=tb,
 float=htb,
 aboveskip=8mm,
 belowskip=4mm,
 backgroundcolor=\color{cloudwhite},
 showspaces=false,                  % show spaces adding particular underscores
 showstringspaces=false,            % underline spaces within strings
 showtabs=false,                    % show tabs within strings adding particular underscores
 tabsize=2,                         % sets default tabsize to 2 spaces
 captionpos=t,                      % sets the caption-position to bottom
 belowcaptionskip=12pt,             % space between caption and listing
 breaklines=true,                   % sets automatic line breaking
 breakatwhitespace=false,           % sets if automatic breaks should only happen at whitespace
 escapeinside={\%*}{*)},            % if you want to add a comment within your code
 morekeywords={*,var,template,new}  % if you want to add more keywords to the set
}

\lstdefinelanguage{XML}
{
  captionpos=b,
  basicstyle=\ttfamily\scriptsize,
  morestring=[s]{"}{"},
  morecomment=[s]{?}{?},
  morecomment=[s]{!--}{--},
  commentstyle=\color{gray},
  moredelim=[s][\color{black}]{>}{<},
  moredelim=[s][\color{red}]{\ }{=},
  stringstyle=\color{engineering},
  identifierstyle=\color{blue}
}

\lstset{
  language=Python,
  captionpos=b,
  basicstyle=\ttfamily\scriptsize,
  keywordstyle=\color{blue},
  commentstyle=\color{gray},
  stringstyle=\color{engineering},
  breaklines=true,
  frame=single
}

\lstdefinelanguage{JSON}
{
  captionpos=b,
  basicstyle=\ttfamily\scriptsize,
  commentstyle=\color{gray},
  stringstyle=\color{black},
  moredelim=[s][\color{engineering}]{'}{'},
  literate=
    *{0}{{{\color{engineering}0}}}{1}
    {1}{{{\color{engineering}1}}}{1}
    {2}{{{\color{engineering}2}}}{1}
    {3}{{{\color{engineering}3}}}{1}
    {4}{{{\color{engineering}4}}}{1}
    {5}{{{\color{engineering}5}}}{1}
    {6}{{{\color{engineering}6}}}{1}
    {7}{{{\color{engineering}7}}}{1}
    {8}{{{\color{engineering}8}}}{1}
    {9}{{{\color{engineering}9}}}{1}
    {:}{{{\color{engineering}{:}}}}{1}
    {,}{{{\color{engineering}{,}}}}{1}
    {\{}{{{\color{engineering}{\{}}}}{1}
    {\}}{{{\color{engineering}{\}}}}}{1}
    {[}{{{\color{engineering}{[}}}}{1}
    {]}{{{\color{engineering}{]}}}}{1},
}

\lstdefinelanguage{JavaScript}{
  morekeywords=[1]{break, continue, delete, else, for, function, if, in,
    new, return, this, typeof, var, void, while, with},
  % Literals, primitive types, and reference types.
  morekeywords=[2]{false, null, true, boolean, number, undefined,
    Array, Boolean, Date, Math, Number, String, Object},
  % Built-ins.
  morekeywords=[3]{eval, parseInt, parseFloat, escape, unescape},
  sensitive,
  morecomment=[s]{/*}{*/},
  morecomment=[l]//,
  morecomment=[s]{/**}{*/}, % JavaDoc style comments
  morestring=[b]',
  morestring=[b]"
}[keywords, comments, strings]

\definecolor{likert1}{rgb}{0.267, 0.490, 0.333}
\definecolor{likert2}{rgb}{0.525, 0.691, 0.490}
\definecolor{likert3}{rgb}{0.961, 0.776, 0.239}
\definecolor{likert4}{rgb}{0.926, 0.588, 0.220}
\definecolor{likert5}{rgb}{0.859, 0.329, 0.223}
\newcommand{\likertpct}[6][0.5]{%
  \raisebox{-0.1\height}{%
    \resizebox{#1\textwidth}{11pt}{%
      \color{likert1}\rule{#2mm}{11pt}%
      \color{likert2}\rule{#3mm}{11pt}%
      \color{likert3}\rule{#4mm}{11pt}%
      \color{likert4}\rule{#5mm}{11pt}%
      \color{likert5}\rule{#6mm}{11pt}%
    }%
  }%
}
